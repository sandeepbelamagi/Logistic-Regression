version: 1
entity: raw_subscription_label
description: Outcome event linked to a prior contact with explicit label delay tracking.
owners:
  - ml-platform
  - experimentation
primary_key:
  - label_event_id
partition_keys:
  - label_date
fields:
  - name: label_event_id
    type: string
    required: true
    description: Unique identifier for the label event.
  - name: parent_event_id
    type: string
    required: true
    description: Contact event_id this label belongs to.
  - name: label_ts
    type: timestamp
    required: true
    description: Time the label was observed.
  - name: label_date
    type: date
    required: true
    description: Partition date derived from label_ts.
  - name: subscribed
    type: integer
    required: true
    description: Binary subscription outcome encoded as 0 or 1.
  - name: attribution_window_hours
    type: integer
    required: true
    description: Attribution window used for this label.
  - name: label_delay_seconds
    type: integer
    required: true
    description: Difference between label_ts and the original event timestamp.
  - name: source_name
    type: string
    required: true
    description: Producer or file name that emitted the label.
quality_rules:
  - parent_event_id must reference an existing raw_contact_event.event_id
  - subscribed must be 0 or 1
  - label_delay_seconds must be greater than or equal to 0
