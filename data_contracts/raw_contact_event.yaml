version: 1
entity: raw_contact_event
description: Immutable customer contact event captured before label arrival.
owners:
  - ml-platform
  - growth-analytics
primary_key:
  - event_id
partition_keys:
  - event_date
retention:
  hot_days: 30
  cold_days: 365
fields:
  - name: event_id
    type: string
    required: true
    description: Unique identifier for the contact event.
  - name: event_ts
    type: timestamp
    required: true
    description: Event creation time in UTC.
  - name: event_date
    type: date
    required: true
    description: Partition date derived from event_ts.
  - name: request_id
    type: string
    required: true
    description: Trace identifier spanning feature lookup, scoring, and decisioning.
  - name: contact_id
    type: string
    required: true
    description: Synthetic contact identifier derived from the offline row id.
  - name: campaign_id
    type: string
    required: false
    description: Synthetic campaign identifier for grouping offline rows.
  - name: context_features
    type: map<string,string>
    required: false
    description: Raw customer and campaign features before transformation.
  - name: source_name
    type: string
    required: true
    description: Producer or file name that emitted the event.
quality_rules:
  - event_id must be unique within retention window
  - event_ts must not be null
  - request_id must be present
  - contact_id must be present
