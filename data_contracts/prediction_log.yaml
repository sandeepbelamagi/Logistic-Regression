version: 1
entity: prediction_log
description: Online scoring record for audit, replay, calibration analysis, and business evaluation.
owners:
  - ml-platform
  - serving
primary_key:
  - prediction_id
partition_keys:
  - prediction_date
fields:
  - name: prediction_id
    type: string
    required: true
    description: Unique prediction record identifier.
  - name: prediction_date
    type: date
    required: true
    description: Partition date derived from prediction_ts.
  - name: prediction_ts
    type: timestamp
    required: true
    description: Time the prediction was produced.
  - name: request_id
    type: string
    required: true
    description: Trace identifier joining request, features, and outcome.
  - name: event_id
    type: string
    required: false
    description: Upstream event identifier when tied to a logged contact.
  - name: model_version
    type: string
    required: true
    description: Deployed Logistic Regression model version.
  - name: calibration_version
    type: string
    required: false
    description: Deployed calibration artifact version.
  - name: feature_set_version
    type: string
    required: true
    description: Online feature schema version.
  - name: raw_score
    type: float
    required: true
    description: Pre-calibration model output.
  - name: calibrated_score
    type: float
    required: true
    description: Final probability used by downstream policy.
  - name: decision_policy_version
    type: string
    required: false
    description: Policy version applied after scoring.
  - name: latency_ms
    type: float
    required: true
    description: End-to-end scoring latency for the prediction request.
  - name: task_context
    type: string
    required: true
    description: One of bank_marketing, fraud_policy, or loan_policy.
quality_rules:
  - calibrated_score must be between 0 and 1
  - latency_ms must be greater than or equal to 0
  - model_version must be present
