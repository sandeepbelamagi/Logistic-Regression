version: 1
entity: raw_impression_event
description: Immutable impression or candidate-serving event captured before label arrival.
owners:
  - ml-platform
  - ads-ranking
primary_key:
  - event_id
partition_keys:
  - event_date
retention:
  hot_days: 30
  cold_days: 365
fields:
  - name: event_id
    type: string
    required: true
    description: Unique identifier for the impression or scoring event.
  - name: event_ts
    type: timestamp
    required: true
    description: Event creation time in UTC.
  - name: event_date
    type: date
    required: true
    description: Partition date derived from event_ts.
  - name: request_id
    type: string
    required: true
    description: Trace identifier spanning feature lookup, scoring, and decisioning.
  - name: user_id
    type: string
    required: false
    description: Stable user identifier when available.
  - name: ad_id
    type: string
    required: true
    description: Ad or item identifier.
  - name: campaign_id
    type: string
    required: false
    description: Advertiser campaign identifier.
  - name: placement_id
    type: string
    required: false
    description: Inventory placement identifier.
  - name: device_type
    type: string
    required: false
    description: Device family used for serving.
  - name: geo_country
    type: string
    required: false
    description: Country inferred at serving time.
  - name: context_features
    type: map<string,string>
    required: false
    description: Raw context keys before feature transformation.
  - name: bid_value
    type: float
    required: false
    description: Bid used for expected value ranking when applicable.
  - name: ingestion_source
    type: string
    required: true
    description: Producer or stream name that emitted the event.
quality_rules:
  - event_id must be unique within retention window
  - event_ts must not be null
  - request_id must be present
  - ad_id must be present for ranking events
